name: API Tests

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: task_forge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d task_forge"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/task_forge

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Dependencies
        run: python -m pip install -r requirements.txt

      - name: Run Alembic Migration
        run: alembic upgrade head

      - name: Run API Tests
        run: pytest src/tests/test_task_batches_extreme.py -q -p no:cacheprovider
